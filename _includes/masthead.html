{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav" style="display: flex; align-items: center;">
        <button><div class="navicon"></div></button>
        <ul class="visible-links" style="display: flex; align-items: center; list-style: none; margin: 0; padding: 0;">
          <li class="masthead__menu-item masthead__menu-item--lg" style="margin-left: 40px; margin-right: 30px;">
            <a href="{{ base_path }}/" style="display: inline-block; border: none !important; text-decoration: none !important;">
              <img src="{{ base_path }}/images/ghj.gif" 
                   alt="{{ site.title }}" 
                   style="height: 50px; width: auto; max-width: none; vertical-align: middle; display: block; margin-top: -20px;">
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item" style="height: 50px; line-height: 50px; margin-left: 20px;">
              <a href="{{ domain }}{{ link.url }}" style="font-size: 1rem; text-decoration: none; display: inline-block; vertical-align: middle;">
                {{ link.title }}
              </a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>

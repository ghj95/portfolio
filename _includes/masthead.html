{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav" style="display: flex; align-items: flex-start; padding-top: 10px;">
        <button><div class="navicon"></div></button>
        <ul class="visible-links" style="display: flex; align-items: center; margin: 0; padding: 0; list-style: none;">
          <li class="masthead__menu-item masthead__menu-item--lg" style="margin-left: 40px; margin-right: 30px;">
            <a href="{{ base_path }}/" style="display: inline-block; padding-bottom: 5px; border-bottom: none !important; text-decoration: none !important;">
              <img src="{{ base_path }}/images/ghj.gif" 
                   alt="{{ site.title }}" 
                   style="height: 50px; width: auto; max-width: none; display: block;">
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item" style="margin-left: 20px; display: inline-block;">
              <a href="{{ domain }}{{ link.url }}" style="font-size: 1.25rem; font-family: var(--sans-serif); text-decoration: none; color: inherit; display: inline-block; border-bottom: 2px solid transparent;">
                {{ link.title }}
              </a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
